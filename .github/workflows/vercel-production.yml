name: Deploy to Vercel Production

# Force every push to `main` to become a PRODUCTION deployment on Vercel.
# Prevents the "stuck on old version" bug where auto-promote was silently off.
#
# Required repo secrets (set once in GitHub → Settings → Secrets and variables → Actions):
#   - VERCEL_TOKEN       : personal access token from https://vercel.com/account/tokens
#   - VERCEL_ORG_ID      : team_SrDWY44Jj4C9PoI02fpgXfua
#   - VERCEL_PROJECT_ID  : prj_ApUa3ici5toPdS9tPuRnwczPYWge

on:
  push:
    branches: [main]

# Prevent concurrent production deploys — newer push cancels older in-flight one
concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy + promote to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
