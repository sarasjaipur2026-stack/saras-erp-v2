name: Perf Monitor (post-idle lag)

# Runs 5 times a day IST (India) against live production:
#   06:23 UTC = 11:53 IST
#   09:23 UTC = 14:53 IST
#   11:23 UTC = 16:53 IST
#   13:23 UTC = 18:53 IST
#   15:23 UTC = 20:53 IST
# Off-minute (:23) on purpose so we don't land on GitHub's rush-hour buckets.

on:
  schedule:
    - cron: '23 6,9,11,13,15 * * *'
  workflow_dispatch:   # manual trigger from GitHub UI

# Prevent overlapping runs
concurrency:
  group: perf-monitor
  cancel-in-progress: false

jobs:
  measure:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write     # to commit perf-log.ndjson
      issues: write       # to open regression issue
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run idle-click perf test
        id: perf
        env:
          PROD_URL:             ${{ vars.PROD_URL || 'https://saras-erp-v2-rebuild.vercel.app' }}
          SARAS_TEST_EMAIL:     ${{ secrets.SARAS_TEST_EMAIL }}
          SARAS_TEST_PASSWORD:  ${{ secrets.SARAS_TEST_PASSWORD }}
          GITHUB_SHA:           ${{ github.sha }}
          GITHUB_REF_NAME:      ${{ github.ref_name }}
        run: |
          set +e
          npx playwright test --config=playwright.perf.config.js 2>&1 | tee playwright-output.txt
          EXIT=$?
          # The test prints one JSON line; grep it out cleanly
          grep -oE '^\{"timestamp".*\}$' playwright-output.txt | tail -1 > perf-run.json || true
          if [ ! -s perf-run.json ]; then
            # Playwright failed before emitting JSON — synthesize a failure record
            echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"commit\":\"${GITHUB_SHA}\",\"failed\":true,\"errors\":[\"playwright exit $EXIT\"]}" > perf-run.json
          fi
          cat perf-run.json

      - name: Append to perf log
        run: |
          mkdir -p docs
          cat perf-run.json >> docs/perf-log.ndjson
          echo "" >> docs/perf-log.ndjson

      - name: Compute rolling median + detect regression
        id: regression
        run: |
          node -e "
            const fs = require('fs');
            const lines = fs.readFileSync('docs/perf-log.ndjson', 'utf8').trim().split('\n').filter(Boolean);
            const entries = lines.map(l => { try { return JSON.parse(l) } catch { return null } }).filter(Boolean);
            const latest = entries[entries.length - 1];
            const window = entries.slice(-11, -1).filter(e => !e.failed && typeof e.post_idle_orders_ms === 'number');

            const median = (arr) => {
              if (!arr.length) return null;
              const s = [...arr].sort((a,b)=>a-b);
              const m = Math.floor(s.length/2);
              return s.length % 2 ? s[m] : (s[m-1]+s[m])/2;
            };
            const ms = median(window.map(e => e.post_idle_orders_ms));
            let regressed = false, reason = '';
            if (latest.failed) { regressed = true; reason = 'test run failed: ' + (latest.errors || []).join(' | '); }
            else if (ms && latest.post_idle_orders_ms > Math.max(ms * 1.5, ms + 800)) {
              regressed = true;
              reason = \`post_idle_orders_ms = \${latest.post_idle_orders_ms}ms vs rolling median \${Math.round(ms)}ms (>50% or +800ms worse)\`;
            }
            else if (latest.token_refreshes_in_post_idle > 1) {
              regressed = true;
              reason = \`token_refreshes_in_post_idle = \${latest.token_refreshes_in_post_idle} (>1 means authGate race returned)\`;
            }
            fs.writeFileSync(process.env.GITHUB_OUTPUT, \`regressed=\${regressed}\nreason=\${reason}\nmedian=\${ms || 'n/a'}\nlatest=\${latest.post_idle_orders_ms || 'n/a'}\n\`, { flag: 'a' });
            console.log(regressed ? 'REGRESSION: ' + reason : 'OK — post_idle_orders_ms=' + latest.post_idle_orders_ms + 'ms median=' + (ms || 'n/a'));
          "

      - name: Commit perf log
        run: |
          git config user.name 'perf-monitor[bot]'
          git config user.email 'perf-monitor@users.noreply.github.com'
          git add docs/perf-log.ndjson
          git diff --cached --quiet || git commit -m "chore(perf): log run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Open regression issue
        if: steps.regression.outputs.regressed == 'true'
        uses: actions/github-script@v7
        env:
          REASON: ${{ steps.regression.outputs.reason }}
          MEDIAN: ${{ steps.regression.outputs.median }}
          LATEST: ${{ steps.regression.outputs.latest }}
        with:
          script: |
            const fs = require('fs');
            const latest = JSON.parse(fs.readFileSync('perf-run.json', 'utf8'));
            const body = [
              '## Post-idle perf regression detected',
              '',
              '**Reason:** ' + process.env.REASON,
              '',
              '| Metric | Value |',
              '|---|---|',
              '| post_idle_orders_ms (latest) | ' + process.env.LATEST + ' |',
              '| Rolling median (10 runs)     | ' + process.env.MEDIAN + ' |',
              '| commit                       | ' + latest.commit + ' |',
              '| branch                       | ' + latest.branch + ' |',
              '| token refreshes in post-idle | ' + latest.token_refreshes_in_post_idle + ' |',
              '',
              '<details><summary>Full latest JSON</summary>',
              '',
              '```json',
              JSON.stringify(latest, null, 2),
              '```',
              '',
              '</details>',
              '',
              '@sarasjaipur2026-stack Claude will investigate on the next scheduled watchdog run.',
            ].join('\n');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Perf regression: ${latest.timestamp} — ${process.env.REASON.slice(0, 80)}`,
              body,
              labels: ['perf', 'regression', 'auto-detected'],
            });
